name: One-time V74 wire

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  wire:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v74-machine-learning-mobile-balance

      - name: Apply V74 release wiring
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          pairs = (
              ('data-release="2026.07.19.73"', 'data-release="2026.07.19.74"'),
              ('tech-icons-v69.css?v=20260719.73', 'tech-icons-v69.css?v=20260719.74'),
              ('hero-interface-v68.js?v=20260719.73', 'hero-interface-v68.js?v=20260719.74'),
          )
          for old, new in pairs:
              assert text.count(old) == 1, (old, text.count(old))
              text = text.replace(old, new, 1)
          index.write_text(text, encoding='utf-8')

          js = Path('hero-interface-v68.js')
          text = js.read_text(encoding='utf-8')
          old = 'document.documentElement.dataset.release = "2026.07.19.73";'
          new = 'document.documentElement.dataset.release = "2026.07.19.74";'
          assert text.count(old) == 1
          js.write_text(text.replace(old, new, 1), encoding='utf-8')

          validator = Path('scripts/validate_site.py')
          text = validator.read_text(encoding='utf-8')
          pairs = (
              ('data-release="2026.07.19.73"', 'data-release="2026.07.19.74"'),
              ('V73 release marker is missing', 'V74 release marker is missing'),
          )
          for old, new in pairs:
              assert text.count(old) == 1, (old, text.count(old))
              text = text.replace(old, new, 1)
          validator.write_text(text, encoding='utf-8')
          PY

          node --check hero-interface-v68.js
          python3 scripts/validate_site.py
          git diff --check

      - name: Commit and self-delete
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/one-time-v74-wire.yml
          git add index.html hero-interface-v68.js scripts/validate_site.py .github/workflows/one-time-v74-wire.yml
          git commit -m 'Wire V74 mobile Machine Learning balance'
          git push origin HEAD:feat/v74-machine-learning-mobile-balance
