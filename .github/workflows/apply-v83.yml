name: Apply V83 touch refinement

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V83 branch
        uses: actions/checkout@v4
        with:
          ref: fix/v83-touch-state-desktop-scale
          fetch-depth: 0

      - name: Wire V83 release and validation
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          replacements = {
              '<html lang="en" data-release="2026.07.19.82">': '<html lang="en" data-release="2026.07.19.83">',
              'tech-icons-v69.css?v=20260719.82': 'tech-icons-v69.css?v=20260719.83',
              'hero-interface-v68.js?v=20260719.82': 'hero-interface-v68.js?v=20260719.83',
          }
          for old, new in replacements.items():
              if index.count(old) != 1:
                  raise SystemExit(f"Expected one index occurrence of {old!r}; found {index.count(old)}")
              index = index.replace(old, new, 1)
          index_path.write_text(index, encoding="utf-8")

          validator_path = Path("scripts/validate_site.py")
          validator = validator_path.read_text(encoding="utf-8")
          replacements = {
              'data-release="2026.07.19.82"': 'data-release="2026.07.19.83"',
              'tech-icons-v69.css?v=20260719.82': 'tech-icons-v69.css?v=20260719.83',
              'hero-interface-v68.js?v=20260719.82': 'hero-interface-v68.js?v=20260719.83',
              'dataset.techIcons = "v82"': 'dataset.techIcons = "v83"',
              'V82 release marker': 'V83 release marker',
              'V82 technical rail stylesheet': 'V83 technical rail stylesheet',
              'V82 technical rail script': 'V83 technical rail script',
              'V82 technical rail JavaScript': 'V83 technical rail JavaScript',
              'V82 technical rail CSS': 'V83 technical rail CSS',
          }
          for old, new in replacements.items():
              if old not in validator:
                  raise SystemExit(f"Validator token not found: {old}")
              validator = validator.replace(old, new)

          anchor = '    exact_once_assets = ('
          if validator.count(anchor) != 1:
              raise SystemExit("Could not locate exact-once validation anchor")

          extra = '''    touch_js_tokens = (
              'is-pressing',
              'pointerdown',
              'pointerup',
              'pointercancel',
              'lostpointercapture',
          )
          for token in touch_js_tokens:
              if token not in tech_js_text:
                  errors.append(f"V83 touch interaction token is missing: {token}")

          touch_css_tokens = (
              '.hero-tech-item.is-pressing',
              '@media (hover: hover) and (pointer: fine)',
              '@media (min-width: 861px)',
          )
          for token in touch_css_tokens:
              if token not in tech_css_text:
                  errors.append(f"V83 interaction or desktop-scale CSS token is missing: {token}")

          obsolete_touch_tokens = (
              'is-activating',
              'showTapGlow',
          )
          for token in obsolete_touch_tokens:
              if token in tech_js_text or token in tech_css_text:
                  errors.append(f"Obsolete timed touch state remains: {token}")

          '''
          validator = validator.replace(anchor, extra + anchor, 1)
          validator_path.write_text(validator, encoding="utf-8")

          Path(".github/workflows/v83-finalize.yml").unlink(missing_ok=True)
          PY

      - name: Commit V83 branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No V83 finalization changes required"
            exit 0
          fi
          git commit -m "Finalize V83 touch behavior and desktop scale"
          git push origin HEAD:fix/v83-touch-state-desktop-scale
