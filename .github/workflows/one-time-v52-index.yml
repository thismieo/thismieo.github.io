name: One-time V52 index wiring

on:
  push:
    branches:
      - feat/v52-unified-header-weather-progress

permissions:
  contents: write

jobs:
  wire-v52-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out V52 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v52-unified-header-weather-progress
          fetch-depth: 0

      - name: Wire V52 stylesheet and ticker controller
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = {
              '<html lang="en" data-release="2026.07.18.50">': '<html lang="en" data-release="2026.07.18.52">',
              '  <link rel="stylesheet" href="mobile.css?v=20260718.44" />': '  <link rel="stylesheet" href="mobile.css?v=20260718.44" />\n  <link rel="stylesheet" href="polish-v52.css?v=20260718.52" data-polish-v52 />',
              'ticker-v44.js?v=20260718.50': 'ticker-v44.js?v=20260718.52',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected V52 index marker not found: {old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/one-time-v52-index.yml").unlink()
          PY

      - name: Commit V52 index wiring and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/one-time-v52-index.yml
          git commit -m "Wire V52 interface assets"
          git push origin HEAD:feat/v52-unified-header-weather-progress
