name: Validate portfolio

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture site validation output
        id: structure
        shell: bash
        run: |
          set +e
          python3 scripts/validate_site.py > validation-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation output
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: validation-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Require structural validation success
        run: test "${{ steps.structure.outputs.status }}" = "0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate every JavaScript file
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -maxdepth 1 -type f -name '*.js' -print0)

      - name: Check whitespace
        run: git diff --check
