name: Validate portfolio

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-v89:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feat/v89-learning-console-rebuild-final'
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V89 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v89-learning-console-rebuild-final
          fetch-depth: 0

      - name: Apply V89 rebuild once
        run: |
          if [ -f scripts/apply_v89_learning_console.py ]; then
            python scripts/apply_v89_learning_console.py
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Rebuild learning console as pure CSS component"
            git push origin HEAD:feat/v89-learning-console-rebuild-final
          else
            echo "V89 rebuild already applied."
          fi

  validate:
    needs: [integrate-v89]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check out current pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate every JavaScript file
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -maxdepth 1 -type f -name '*.js' -print0)

      - name: Validate site structure and assets
        run: python3 scripts/validate_site.py

      - name: Check whitespace
        run: git diff --check
