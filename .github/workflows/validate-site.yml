name: Validate portfolio

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          for file in interactions.js portrait.js mobile-nav.js; do
            node --check "$file"
          done

      - name: Validate site structure and assets
        run: python3 scripts/validate_site.py
