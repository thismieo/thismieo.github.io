name: Apply V22 neural section fix

on:
  push:
    branches:
      - dev-portfolio-v22-desktop-neural-section
    paths:
      - .v22-neural-trigger

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev-portfolio-v22-desktop-neural-section
      - name: Link V22 stylesheet
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '  <link rel="stylesheet" href="v21.css?v=1" />'
          new = old + '\n  <link rel="stylesheet" href="v22.css?v=1" />'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one V21 stylesheet link, found {count}")
          if 'v22.css' in text:
              raise SystemExit("V22 stylesheet is already linked")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Commit index update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "fix: load desktop neural section correction"
          git push
