name: One-time V55 mobile project wiring

on:
  push:
    branches:
      - feat/v55-mobile-project-visuals

permissions:
  contents: write

jobs:
  wire-v55:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v55-mobile-project-visuals
          fetch-depth: 0

      - name: Wire mobile project layer and validate
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          html_path = Path('index.html')
          html = html_path.read_text(encoding='utf-8')

          old_release = '<html lang="en" data-release="2026.07.18.54">'
          new_release = '<html lang="en" data-release="2026.07.18.55">'
          anchor = '  <link rel="stylesheet" href="project-visuals-v54.css?v=20260718.54" data-project-visuals-v54 />\n'
          addition = anchor + '  <link rel="stylesheet" href="project-visuals-mobile-v55.css?v=20260718.55" data-project-visuals-mobile-v55 />\n'

          if old_release not in html:
              raise SystemExit('Expected V54 release marker not found')
          if anchor not in html:
              raise SystemExit('Expected V54 project stylesheet anchor not found')
          if 'project-visuals-mobile-v55.css' in html:
              raise SystemExit('V55 mobile project stylesheet already exists')

          html = html.replace(old_release, new_release, 1)
          html = html.replace(anchor, addition, 1)
          html_path.write_text(html, encoding='utf-8')

          css = Path('project-visuals-mobile-v55.css').read_text(encoding='utf-8')
          if css.count('{') != css.count('}'):
              raise SystemExit('V55 CSS braces are unbalanced')
          required = [
              '@media (max-width: 860px)',
              '#projects .project-visual-v54',
              '#projects .project-v54-svg',
              'project-v54-health-line',
              'project-v54-fraud-node.is-alert',
              'project-v54-traffic-road.is-cyan',
          ]
          for marker in required:
              if marker not in css:
                  raise SystemExit(f'Missing V55 CSS marker: {marker}')

          Path('.github/workflows/one-time-v55-mobile-projects.yml').unlink()
          PY

      - name: Commit V55 wiring and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html project-visuals-mobile-v55.css .github/workflows/one-time-v55-mobile-projects.yml
          git commit -m "Wire V55 mobile project visuals"
          git push origin HEAD:feat/v55-mobile-project-visuals
