name: Apply V15 cache bust

on:
  push:
    branches:
      - dev-portfolio-v15-premium-mobile-header

permissions:
  contents: write

jobs:
  update-cache-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update V13 stylesheet cache version
        run: sed -i 's/v13.css?v=2/v13.css?v=3/' index.html
      - name: Commit cache version
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore(site): refresh V15 mobile header stylesheet"
          git push
