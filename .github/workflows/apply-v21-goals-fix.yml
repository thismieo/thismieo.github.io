name: Apply V21 goals alignment fix

on:
  push:
    branches:
      - dev-portfolio-v21-desktop-goals-alignment
    paths:
      - .v21-goals-trigger

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev-portfolio-v21-desktop-goals-alignment
      - name: Link V21 stylesheet
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '  <link rel="stylesheet" href="v18.css?v=2" data-v18-cyber-rail />'
          new = old + '\n  <link rel="stylesheet" href="v21.css?v=1" />'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one V18 stylesheet link, found {count}")
          if 'v21.css' in text:
              raise SystemExit("V21 stylesheet is already linked")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Commit index update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "fix: load desktop goals alignment layer"
          git push
