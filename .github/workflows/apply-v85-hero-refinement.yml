name: Apply V85 hero refinement

on:
  push:
    branches:
      - feat/v85-hero-refinement

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V85 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v85-hero-refinement
          fetch-depth: 0

      - name: Wire V85 cache keys and validation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one {label}; found {count}")
              return text.replace(old, new, 1)

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          index = replace_once(
              index,
              '<html lang="en" data-release="2026.07.19.83">',
              '<html lang="en" data-release="2026.07.19.85">',
              "V83 release marker",
          )
          index = replace_once(
              index,
              '<script src="hero-interface-v68.js?v=20260719.83" defer></script>',
              '<script src="hero-interface-v68.js?v=20260719.85" defer></script>',
              "Hero interface cache key",
          )
          index_path.write_text(index, encoding="utf-8")

          validator_path = Path("scripts/validate_site.py")
          validator = validator_path.read_text(encoding="utf-8")
          validator = replace_once(
              validator,
              '    if \'data-release="2026.07.19.83"\' not in index_text:\n        errors.append("V83 release marker is missing")',
              '    if \'data-release="2026.07.19.85"\' not in index_text:\n        errors.append("V85 release marker is missing")',
              "validator release marker",
          )
          validator = replace_once(
              validator,
              '    if \'hero-interface-v68.js?v=20260719.83\' not in index_text:\n        errors.append("V83 technical rail script cache key is missing")',
              '    if \'hero-interface-v68.js?v=20260719.85\' not in index_text:\n        errors.append("V85 Hero refinement script cache key is missing")',
              "validator Hero cache key",
          )
          validator = replace_once(
              validator,
              '        \'dataset.techIcons = "v83"\',\n    )',
              '        \'dataset.techIcons = "v83"\',\n        \'CORE LEARNING STACK\',\n        \'compactViewport\',\n        \'is-holding\',\n        \'micro-polish.css?v=20260719.85\',\n    )',
              "V85 JavaScript validation tokens",
          )
          validator_path.write_text(validator, encoding="utf-8")
          PY

      - name: Remove one-time workflow from feature branch
        run: rm .github/workflows/apply-v85-hero-refinement.yml

      - name: Validate repository
        run: |
          find . -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py
          git diff --check

      - name: Commit V85 integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/validate_site.py .github/workflows/apply-v85-hero-refinement.yml
          git commit -m "Integrate V85 cache keys and validation"
          git push origin HEAD:feat/v85-hero-refinement
