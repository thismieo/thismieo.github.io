name: V68 inspect validation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request merge
        uses: actions/checkout@v4

      - name: Capture exact validation output
        shell: bash
        run: |
          set +e
          {
            echo '=== VALIDATION OUTPUT ==='
            python3 scripts/validate_site.py
            status=$?
            echo
            echo "VALIDATION_EXIT_STATUS=$status"
            echo
            echo '=== TOP-LEVEL FILES ==='
            find . -maxdepth 1 -type f -printf '%f\n' | sort
          } > validation-inspection.txt 2>&1
          exit 0

      - name: Upload inspection
        uses: actions/upload-artifact@v4
        with:
          name: v68-validation-inspection
          path: validation-inspection.txt
          retention-days: 1
