name: Integrate V94 orbit glow

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate-v94:
    if: github.event.pull_request.head.ref == 'feat/v94-orbit-glow-mobile'
    runs-on: ubuntu-latest
    steps:
      - name: Check out V94 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v94-orbit-glow-mobile
          fetch-depth: 0

      - name: Apply and validate V94 once
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/apply_v94_orbit_glow.py ]; then
            echo "V94 integration already applied."
            exit 0
          fi

          python3 scripts/apply_v94_orbit_glow.py
          python3 scripts/validate_site.py

          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -maxdepth 1 -type f -name '*.js' -print0)

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore bright orbit glows and mobile satellites"
          git push origin HEAD:feat/v94-orbit-glow-mobile
