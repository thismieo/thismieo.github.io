name: One-time V54 project visual validation

on:
  push:
    branches:
      - feat/v54-project-visuals

permissions:
  contents: write

jobs:
  validate-v54:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v54-project-visuals
          fetch-depth: 0

      - name: Validate JavaScript and asset wiring
        shell: bash
        run: |
          node --check project-visuals-v54.js
          python - <<'PY'
          from pathlib import Path

          css = Path("project-visuals-v54.css").read_text(encoding="utf-8")
          if css.count("{") != css.count("}"):
              raise SystemExit("CSS braces are unbalanced")

          html = Path("index.html").read_text(encoding="utf-8")
          required = [
              'project-visuals-v54.css?v=20260718.54',
              'project-visuals-v54.js?v=20260718.54',
              'data-release="2026.07.18.54"',
          ]
          for marker in required:
              if html.count(marker) != 1:
                  raise SystemExit(f"Expected exactly one V54 marker: {marker}")

          Path(".github/workflows/one-time-v54-validation.yml").unlink()
          PY

      - name: Remove successful temporary validation workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/one-time-v54-validation.yml
          git commit -m "Confirm V54 project visual validation"
          git push origin HEAD:feat/v54-project-visuals
