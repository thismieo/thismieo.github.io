name: One-time V53 section navigator wiring

on:
  push:
    branches:
      - feat/v53-section-navigator

permissions:
  contents: write

jobs:
  wire-v53:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v53-section-navigator
          fetch-depth: 0

      - name: Wire V53 CSS and JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = {
              '<html lang="en" data-release="2026.07.18.52">': '<html lang="en" data-release="2026.07.18.53">',
              '  <link rel="stylesheet" href="polish-v52.css?v=20260718.52" data-polish-v52 />': '  <link rel="stylesheet" href="polish-v52.css?v=20260718.52" data-polish-v52 />\n  <link rel="stylesheet" href="section-nav-v53.css?v=20260718.53" data-section-nav-v53 />',
              '  <script src="mobile-nav.js?v=20260718.44" defer></script>': '  <script src="mobile-nav.js?v=20260718.44" defer></script>\n  <script src="section-nav-v53.js?v=20260718.53" defer></script>',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected marker not found: {old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/one-time-wire-v53.yml").unlink()
          PY

      - name: Commit final asset wiring
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/one-time-wire-v53.yml
          git commit -m "Wire V53 section navigator assets"
          git push origin HEAD:feat/v53-section-navigator
