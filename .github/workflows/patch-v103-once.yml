name: Patch V103 cache keys once

on:
  push:
    branches:
      - feat/project-footer-polish-v103
    paths:
      - .github/workflows/patch-v103-once.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/project-footer-polish-v103
          fetch-depth: 0

      - name: Update cache keys and release marker
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          replacements = {
              '<html lang="en" data-release="2026.07.19.97">': '<html lang="en" data-release="2026.07.19.103">',
              'project-readouts-v66.css?v=20260718.68': 'project-readouts-v66.css?v=20260719.103',
              'project-visuals-v54.js?v=20260718.54': 'project-visuals-v54.js?v=20260719.103',
              'core-contact-v63.js?v=20260718.68': 'core-contact-v63.js?v=20260719.103',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected index token not found: {old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")

      - name: Remove temporary workflow
        run: rm .github/workflows/patch-v103-once.yml

      - name: Commit clean result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-v103-once.yml
          git commit -m "Update V103 cache keys and remove temporary workflow"
          git push origin HEAD:feat/project-footer-polish-v103
