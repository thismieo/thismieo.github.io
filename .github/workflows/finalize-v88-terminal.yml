name: Finalize V88 terminal runtime

on:
  push:
    branches:
      - feat/v88-terminal-line-swap

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V88 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v88-terminal-line-swap
          fetch-depth: 0

      - name: Wire terminal cache key and regression checks
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          old_script = 'hero-v33.js?v=20260718.44'
          new_script = 'hero-v33.js?v=20260719.88'
          if index.count(old_script) != 1:
              raise SystemExit(f"Expected one old Hero terminal cache key; found {index.count(old_script)}")
          index_path.write_text(index.replace(old_script, new_script, 1), encoding="utf-8")

          validator_path = Path("scripts/validate_site.py")
          validator = validator_path.read_text(encoding="utf-8")

          cache_anchor = '''    if 'hero-interface-v68.js?v=20260719.87' not in index_text:\n        errors.append("V87 visual-only Hero script cache key is missing")\n'''
          cache_replacement = cache_anchor + '''    if 'hero-v33.js?v=20260719.88' not in index_text:\n        errors.append("V88 lightweight Terminal script cache key is missing")\n'''
          if cache_anchor not in validator:
              raise SystemExit("Could not locate Hero cache validation anchor")
          validator = validator.replace(cache_anchor, cache_replacement, 1)

          old_terminal = '''    original_terminal_tokens = (\n        'const output = document.querySelector("#hero-v33-terminal-text")',\n        "window.setTimeout(step, delay)",\n        "schedule(1650)",\n        "schedule(deleting ? 24 : 48)",\n    )\n    for token in original_terminal_tokens:\n        if token not in terminal_js:\n            errors.append(f"Original terminal runtime token is missing: {token}")\n'''
          new_terminal = '''    lightweight_terminal_tokens = (\n        'const output = document.querySelector("#hero-v33-terminal-text")',\n        'output.dataset.terminalMode = "line-swap"',\n        'const HOLD_DURATION = 3400',\n        'const FADE_DURATION = 240',\n        'output.style.opacity = "0"',\n        'output.textContent = phrases[phraseIndex]',\n    )\n    for token in lightweight_terminal_tokens:\n        if token not in terminal_js:\n            errors.append(f"V88 lightweight Terminal token is missing: {token}")\n\n    forbidden_terminal_tokens = (\n        "characterIndex",\n        "deleting ? 24 : 48",\n        "phrase.slice",\n        "requestAnimationFrame",\n    )\n    for token in forbidden_terminal_tokens:\n        if token in terminal_js:\n            errors.append(f"Per-character Terminal runtime remains: {token}")\n'''
          if old_terminal not in validator:
              raise SystemExit("Could not locate original Terminal validation block")
          validator = validator.replace(old_terminal, new_terminal, 1)
          validator_path.write_text(validator, encoding="utf-8")
          PY

      - name: Remove one-time workflow from feature branch
        run: rm .github/workflows/finalize-v88-terminal.yml

      - name: Validate repository
        run: |
          find . -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py
          git diff --check

      - name: Commit V88 integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate lightweight V88 Terminal runtime"
          git push origin HEAD:feat/v88-terminal-line-swap
