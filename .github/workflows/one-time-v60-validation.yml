name: One-time V60 project phone validation

on:
  push:
    branches:
      - feat/v60-project-row-health-nav

permissions:
  contents: write

jobs:
  validate-and-wire:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v60-project-row-health-nav
          fetch-depth: 0

      - name: Wire V60 assets
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_release = 'data-release="2026.07.18.59"'
          new_release = 'data-release="2026.07.18.60"'
          if text.count(old_release) != 1:
              raise SystemExit(f'Expected one V59 release marker, found {text.count(old_release)}')
          text = text.replace(old_release, new_release, 1)

          css_anchor = '  <link rel="stylesheet" href="project-carousel-v59.css?v=20260718.59" data-project-carousel-v59 />'
          css_line = '  <link rel="stylesheet" href="project-mobile-v60.css?v=20260718.60" data-project-mobile-v60 />'
          if text.count(css_anchor) != 1:
              raise SystemExit(f'Expected one V59 CSS anchor, found {text.count(css_anchor)}')
          if css_line not in text:
              text = text.replace(css_anchor, css_anchor + '\n' + css_line, 1)

          js_anchor = '  <script src="project-visuals-v54.js?v=20260718.54" defer></script>'
          js_line = '  <script src="project-mobile-v60.js?v=20260718.60" defer></script>'
          if text.count(js_anchor) != 1:
              raise SystemExit(f'Expected one V54 project script anchor, found {text.count(js_anchor)}')
          if js_line not in text:
              text = text.replace(js_anchor, js_anchor + '\n' + js_line, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate V60 files
        run: |
          node --check project-mobile-v60.js
          python - <<'PY'
          from pathlib import Path

          css = Path('project-mobile-v60.css').read_text(encoding='utf-8')
          html = Path('index.html').read_text(encoding='utf-8')

          if css.count('{') != css.count('}'):
              raise SystemExit('CSS braces are not balanced')

          required_css = [
              'grid-auto-flow: column',
              'scrollbar-width: thin',
              '::-webkit-scrollbar-thumb',
              '.section-nav-v53[data-current-section="projects"]',
              '.project-v60-health-readout'
          ]
          for marker in required_css:
              if marker not in css:
                  raise SystemExit(f'Missing CSS marker: {marker}')

          required_html = [
              'data-release="2026.07.18.60"',
              'project-mobile-v60.css?v=20260718.60',
              'project-mobile-v60.js?v=20260718.60'
          ]
          for marker in required_html:
              if html.count(marker) != 1:
                  raise SystemExit(f'Expected one HTML marker for {marker}, found {html.count(marker)}')
          PY

      - name: Commit V60 wiring and remove workflow
        run: |
          rm .github/workflows/one-time-v60-validation.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/one-time-v60-validation.yml
          git commit -m "Wire and validate V60 phone project refinements"
          git push origin feat/v60-project-row-health-nav
