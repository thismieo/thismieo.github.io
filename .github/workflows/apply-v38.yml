name: Apply V38 asset wiring

on:
  push:
    branches:
      - fix/hero-v38-clean-controls-motion-terminal
    paths:
      - .github/workflows/apply-v38.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/hero-v38-clean-controls-motion-terminal
          fetch-depth: 0

      - name: Wire V38 assets directly
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          index = index.replace("2026.07.17.37", "2026.07.17.38")
          index = index.replace("20260717.37", "20260717.38")

          v37_link = '  <link id="hero-polish-v37-styles" rel="stylesheet" href="hero-polish-v37.css?v=20260717.38" data-hero-polish-v37 />'
          v38_link = '  <link id="hero-refine-v38-styles" rel="stylesheet" href="hero-refine-v38.css?v=20260717.38" data-hero-refine-v38 />'
          if v38_link not in index:
              if v37_link not in index:
                  raise SystemExit("V37 stylesheet link not found after cache-key update")
              index = index.replace(v37_link, f"{v37_link}\n{v38_link}", 1)

          index_path.write_text(index, encoding="utf-8")

          workflow = Path(".github/workflows/apply-v38.yml")
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Validate and commit
        run: |
          grep -q 'data-release="2026.07.17.38"' index.html
          grep -q 'hero-refine-v38.css?v=20260717.38' index.html
          grep -q 'hero-v33.js?v=20260717.38' index.html
          node --check hero-v33.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Wire V38 assets and remove one-time workflow"
          git push origin HEAD:fix/hero-v38-clean-controls-motion-terminal
