name: One-time V56 contact hub wiring

on:
  push:
    branches:
      - feat/v56-contact-hub

permissions:
  contents: write

jobs:
  wire-contact-hub:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v56-contact-hub
          fetch-depth: 0

      - name: Wire V56 assets and validate files
        shell: bash
        run: |
          node --check contact-hub-v56.js
          python - <<'PY'
          from pathlib import Path

          css_path = Path("contact-hub-v56.css")
          css = css_path.read_text(encoding="utf-8")
          if css.count("{") != css.count("}"):
              raise SystemExit("V56 CSS braces are unbalanced")

          index_path = Path("index.html")
          text = index_path.read_text(encoding="utf-8")

          replacements = {
              '<html lang="en" data-release="2026.07.18.55">': '<html lang="en" data-release="2026.07.18.56">',
              '  <link rel="stylesheet" href="project-visuals-mobile-v55.css?v=20260718.55" data-project-visuals-mobile-v55 />': '  <link rel="stylesheet" href="project-visuals-mobile-v55.css?v=20260718.55" data-project-visuals-mobile-v55 />\n  <link rel="stylesheet" href="contact-hub-v56.css?v=20260718.56" data-contact-hub-v56 />',
              '  <script src="project-visuals-v54.js?v=20260718.54" defer></script>': '  <script src="project-visuals-v54.js?v=20260718.54" defer></script>\n  <script src="contact-hub-v56.js?v=20260718.56" defer></script>',
          }

          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f"Expected one index marker: {old}")
              text = text.replace(old, new, 1)

          required = [
              'contact-hub-v56.css?v=20260718.56',
              'contact-hub-v56.js?v=20260718.56',
              'data-release="2026.07.18.56"',
          ]
          for marker in required:
              if text.count(marker) != 1:
                  raise SystemExit(f"Expected one V56 marker: {marker}")

          index_path.write_text(text, encoding="utf-8")
          Path(".github/workflows/one-time-contact-v56.yml").unlink()
          PY

      - name: Commit wiring and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/one-time-contact-v56.yml
          git commit -m "Wire V56 animated contact hub"
          git push origin HEAD:feat/v56-contact-hub
