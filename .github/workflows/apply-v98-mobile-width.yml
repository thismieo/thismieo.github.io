name: Apply V98 mobile width fix

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate-v98:
    if: github.event.pull_request.head.ref == 'fix/v98-mobile-horizontal-overflow'
    runs-on: ubuntu-latest
    steps:
      - name: Check out V98 branch
        uses: actions/checkout@v4
        with:
          ref: fix/v98-mobile-horizontal-overflow
          fetch-depth: 0

      - name: Update release keys and validate
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          validator_path = Path('scripts/validate_site.py')

          index_text = index_path.read_text(encoding='utf-8')
          for old, new in (
              ('data-release="2026.07.19.97"', 'data-release="2026.07.19.98"'),
              ('mobile-performance-v92.css?v=20260719.92', 'mobile-performance-v92.css?v=20260719.98'),
          ):
              if old not in index_text:
                  raise SystemExit(f'Missing index token: {old}')
              index_text = index_text.replace(old, new, 1)
          index_path.write_text(index_text, encoding='utf-8')

          validator_text = validator_path.read_text(encoding='utf-8')
          for old, new in (
              ('data-release="2026.07.19.97"', 'data-release="2026.07.19.98"'),
              ('mobile-performance-v92.css?v=20260719.92', 'mobile-performance-v92.css?v=20260719.98'),
          ):
              if old not in validator_text:
                  raise SystemExit(f'Missing validator token: {old}')
              validator_text = validator_text.replace(old, new, 1)

          marker = '        "#home .hero-console-v92-message",\n'
          additions = (
              '        "overflow-x: clip",\n'
              '        "calc(100vw - 20px)",\n'
              '        "hero-v33-caption",\n'
          )
          if '        "calc(100vw - 20px)",\n' not in validator_text:
              if marker not in validator_text:
                  raise SystemExit('Missing V98 mobile validator insertion point')
              validator_text = validator_text.replace(marker, additions + marker, 1)
          validator_path.write_text(validator_text, encoding='utf-8')
          PY

          python3 scripts/validate_site.py
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -maxdepth 1 -type f -name '*.js' -print0)
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html mobile-performance-v92.css scripts/validate_site.py
          git commit -m "Constrain mobile Hero to the viewport" || exit 0
          git push origin HEAD:fix/v98-mobile-horizontal-overflow
