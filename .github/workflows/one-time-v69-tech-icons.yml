name: One-time V69 tech icons wiring

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  wire-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v69-tech-icons-wave

      - name: Wire V69 assets
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          replacements = {
              'data-release="2026.07.18.68"': 'data-release="2026.07.18.69"',
              'hero-interface-v68.css?v=20260718.68': 'hero-interface-v68.css?v=20260718.69',
              'hero-interface-v68.js?v=20260718.68': 'hero-interface-v68.js?v=20260718.69',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected one match for {old!r}, found {text.count(old)}')
              text = text.replace(old, new, 1)

          anchor = '  <link rel="stylesheet" href="hero-interface-v68.css?v=20260718.69" data-hero-interface-v68 />\n'
          addition = '  <link rel="stylesheet" href="tech-icons-v69.css?v=20260718.69" data-tech-icons-v69 />\n'
          if text.count(anchor) != 1:
              raise SystemExit('V68 stylesheet anchor missing or duplicated')
          if 'tech-icons-v69.css' not in text:
              text = text.replace(anchor, anchor + addition, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate source
        run: |
          set -euo pipefail
          node --check hero-interface-v68.js
          python3 scripts/validate_site.py
          git diff --check
          grep -q 'data-release="2026.07.18.69"' index.html
          test "$(grep -c 'tech-icons-v69.css' index.html)" -eq 1
          test "$(grep -c 'hero-interface-v68.js?v=20260718.69' index.html)" -eq 1

      - name: Commit wiring and remove workflow
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/one-time-v69-tech-icons.yml
          git add index.html .github/workflows/one-time-v69-tech-icons.yml
          git commit -m 'Wire and validate V69 technical icons'
          git push origin HEAD:feat/v69-tech-icons-wave