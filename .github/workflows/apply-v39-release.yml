name: Apply V39 Hero release

on:
  push:
    branches:
      - polish/hero-v39-comprehensive-refinement
    paths:
      - .github/workflows/apply-v39-release.yml

permissions:
  contents: write

jobs:
  wire-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: polish/hero-v39-comprehensive-refinement
          fetch-depth: 0

      - name: Wire V39 assets and release key
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          html = html.replace('2026.07.17.38', '2026.07.17.39')
          html = html.replace('20260717.38', '20260717.39')

          marker = '  <link id="hero-refine-v38-styles" rel="stylesheet" href="hero-refine-v38.css?v=20260717.39" data-hero-refine-v38 />'
          v39 = '  <link id="hero-refine-v39-styles" rel="stylesheet" href="hero-refine-v39.css?v=20260717.39" data-hero-refine-v39 />'
          if v39 not in html:
              if marker not in html:
                  raise SystemExit('V38 stylesheet marker was not found in index.html')
              html = html.replace(marker, marker + '\n' + v39, 1)
          index.write_text(html, encoding='utf-8')

          hero_js = Path('hero-v33.js')
          js = hero_js.read_text(encoding='utf-8')
          js = js.replace('2026.07.17.38', '2026.07.17.39')
          hero_js.write_text(js, encoding='utf-8')
          PY

      - name: Validate release wiring and syntax
        run: |
          grep -q 'data-release="2026.07.17.39"' index.html
          grep -q 'hero-refine-v39.css?v=20260717.39' index.html
          test "$(grep -o 'hero-refine-v39.css' index.html | wc -l)" -eq 1
          test "$(grep -o 'id="hero-refine-v39-styles"' index.html | wc -l)" -eq 1
          node --check hero-v33.js
          python - <<'PY'
          from pathlib import Path
          css = Path('hero-refine-v39.css').read_text(encoding='utf-8')
          if css.count('{') != css.count('}'):
              raise SystemExit('Unbalanced CSS braces in hero-refine-v39.css')
          html = Path('index.html').read_text(encoding='utf-8')
          if html.count('id="hero-refine-v39-styles"') != 1:
              raise SystemExit('V39 stylesheet ID is missing or duplicated')
          if '20260717.38' in html:
              raise SystemExit('Old V38 cache keys remain in index.html')
          PY

      - name: Remove one-time workflow and commit
        run: |
          rm -f .github/workflows/apply-v39-release.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html hero-v33.js hero-refine-v39.css .github/workflows/apply-v39-release.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Wire verified V39 Hero refinement [skip ci]"
          git push origin HEAD:polish/hero-v39-comprehensive-refinement
