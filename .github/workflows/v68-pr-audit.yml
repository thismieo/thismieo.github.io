name: V68 pull request audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  audit-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply deterministic cleanup
        run: python3 tools/v68_cleanup.py

      - name: Run complete source audit
        run: python3 tools/v68_audit.py

      - name: Check whitespace and diff
        run: |
          git diff --check
          git status --short

      - name: Commit audited source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Polish the hero and remove obsolete project layers"
          git push origin HEAD:${{ github.head_ref }}
