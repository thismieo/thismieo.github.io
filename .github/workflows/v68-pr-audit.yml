name: V68 pull request audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  audit-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply deterministic cleanup
        run: python3 tools/v68_cleanup.py

      - name: Run complete source audit
        id: source-audit
        shell: bash
        run: |
          set +e
          python3 tools/v68_audit.py 2>&1 | tee v68-audit-report.txt
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v68-audit-report
          path: v68-audit-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Check whitespace and diff
        run: |
          git diff --check
          git status --short

      - name: Commit audited source
        if: steps.source-audit.outputs.status == '0'
        run: |
          set -euo pipefail
          rm -f v68-audit-report.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Polish the hero and remove obsolete project layers"
          git push origin HEAD:${{ github.head_ref }}

      - name: Fail when audit reports errors
        if: steps.source-audit.outputs.status != '0'
        run: |
          cat v68-audit-report.txt
          exit 1
