name: Apply V20 footer byline

on:
  push:
    branches:
      - dev-portfolio-v20-footer-byline
    paths:
      - .v20-footer-trigger

permissions:
  contents: write

jobs:
  update-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev-portfolio-v20-footer-byline
      - name: Update footer byline
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '      <p><strong>Mohammed Muayad</strong> · AI Engineering Student</p>'
          new = '      <p>by Mohammed Muayad · AI Engineering Student</p>'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one footer byline, found {count}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Commit footer update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "refactor: unify footer byline typography"
          git push
