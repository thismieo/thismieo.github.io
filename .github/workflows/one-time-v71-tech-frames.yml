name: One-time V71 technical icon frames

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  wire-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out V71 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v71-tech-icon-frames

      - name: Wire V71 cache keys and validator
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          replacements = {
              'data-release="2026.07.19.70"': 'data-release="2026.07.19.71"',
              'tech-icons-v69.css?v=20260719.70': 'tech-icons-v69.css?v=20260719.71',
              'hero-interface-v68.js?v=20260719.70': 'hero-interface-v68.js?v=20260719.71',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected one index match for {old!r}, found {text.count(old)}')
              text = text.replace(old, new, 1)
          index.write_text(text, encoding='utf-8')

          validator = Path('scripts/validate_site.py')
          validation_text = validator.read_text(encoding='utf-8')
          validator_replacements = {
              'data-release="2026.07.19.70"': 'data-release="2026.07.19.71"',
              'V70 release marker is missing': 'V71 release marker is missing',
          }
          for old, new in validator_replacements.items():
              if validation_text.count(old) != 1:
                  raise SystemExit(f'Expected one validator match for {old!r}, found {validation_text.count(old)}')
              validation_text = validation_text.replace(old, new, 1)
          validator.write_text(validation_text, encoding='utf-8')
          PY

      - name: Validate V71 implementation
        shell: bash
        run: |
          set -euo pipefail
          node --check hero-interface-v68.js
          python3 scripts/validate_site.py
          git diff --check
          grep -q 'data-release="2026.07.19.71"' index.html
          test "$(grep -c 'tech-icons-v69.css?v=20260719.71' index.html)" -eq 1
          test "$(grep -c 'hero-interface-v68.js?v=20260719.71' index.html)" -eq 1
          grep -q 'is-tech-icons-v71' hero-interface-v68.js
          grep -q 'hero-v71-icon-frame' hero-interface-v68.js
          grep -q 'hero-v71-icon-frame' tech-icons-v69.css
          ! grep -q 'is-tech-icons-v70' hero-interface-v68.js
          ! grep -q 'heroV70' tech-icons-v69.css
          ! grep -q 'text-overflow: ellipsis' tech-icons-v69.css

      - name: Commit V71 wiring and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/one-time-v71-tech-frames.yml
          git add index.html scripts/validate_site.py .github/workflows/one-time-v71-tech-frames.yml
          git commit -m 'Wire and validate V71 technical icon frames'
          git push origin HEAD:feat/v71-tech-icon-frames
