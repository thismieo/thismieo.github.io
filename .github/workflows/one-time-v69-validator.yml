name: One-time V69 validator update

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  update-validator:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v69-tech-icons-wave

      - name: Update permanent validation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/validate_site.py')
          text = path.read_text(encoding='utf-8')

          pairs = [
              ('data-release="2026.07.18.68"', 'data-release="2026.07.18.69"'),
              ('V68 release marker is missing', 'V69 release marker is missing'),
          ]
          for old, new in pairs:
              if text.count(old) != 1:
                  raise SystemExit(f'Expected one match for {old!r}, found {text.count(old)}')
              text = text.replace(old, new, 1)

          runtime_anchor = '        "hero-interface-v68.js",\n        "projects-runtime-v68.js",'
          runtime_new = '        "hero-interface-v68.js",\n        "tech-icons-v69.css",\n        "projects-runtime-v68.js",'
          if text.count(runtime_anchor) != 1:
              raise SystemExit(f'Runtime anchor count: {text.count(runtime_anchor)}')
          text = text.replace(runtime_anchor, runtime_new, 1)

          exact_anchor = '        "hero-interface-v68.js",\n        "projects-runtime-v68.js",\n    )'
          exact_new = '        "hero-interface-v68.js",\n        "tech-icons-v69.css",\n        "projects-runtime-v68.js",\n    )'
          if text.count(exact_anchor) != 1:
              raise SystemExit(f'Exact-once anchor count: {text.count(exact_anchor)}')
          text = text.replace(exact_anchor, exact_new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit validator and remove workflow
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/one-time-v69-validator.yml
          git add scripts/validate_site.py .github/workflows/one-time-v69-validator.yml
          git commit -m 'Validate V69 technical icon assets'
          git push origin HEAD:feat/v69-tech-icons-wave