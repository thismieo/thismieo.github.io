name: Repair V83 validator exactly

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V83 branch
        uses: actions/checkout@v4
        with:
          ref: fix/v83-touch-state-desktop-scale
          fetch-depth: 0

      - name: Replace validator block with exact indentation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/validate_site.py")
          text = path.read_text(encoding="utf-8")
          start = text.index("    touch_js_tokens = (")
          end = text.index("    exact_once_assets = (", start)

          lines = [
              "    touch_js_tokens = (",
              "        'is-pressing',",
              "        'pointerdown',",
              "        'pointerup',",
              "        'pointercancel',",
              "        'lostpointercapture',",
              "    )",
              "    for token in touch_js_tokens:",
              "        if token not in tech_js_text:",
              "            errors.append(f\"V83 touch interaction token is missing: {token}\")",
              "",
              "    touch_css_tokens = (",
              "        '.hero-tech-item.is-pressing',",
              "        '@media (hover: hover) and (pointer: fine)',",
              "        '@media (min-width: 861px)',",
              "    )",
              "    for token in touch_css_tokens:",
              "        if token not in tech_css_text:",
              "            errors.append(f\"V83 interaction or desktop-scale CSS token is missing: {token}\")",
              "",
              "    obsolete_touch_tokens = (",
              "        'is-activating',",
              "        'showTapGlow',",
              "    )",
              "    for token in obsolete_touch_tokens:",
              "        if token in tech_js_text or token in tech_css_text:",
              "            errors.append(f\"Obsolete timed touch state remains: {token}\")",
              "",
              "",
          ]
          block = "\n".join(lines)
          path.write_text(text[:start] + block + text[end:], encoding="utf-8")
          Path(".v83-indent-trigger").unlink(missing_ok=True)
          PY

      - name: Commit exact validator repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix exact V83 validator indentation"
          git push origin HEAD:fix/v83-touch-state-desktop-scale
