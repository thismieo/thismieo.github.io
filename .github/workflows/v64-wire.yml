name: Wire V64 portraitless hero

on:
  push:
    branches:
      - feat/v64-restore-globe-remove-portrait

permissions:
  contents: write

jobs:
  wire-v64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v64-restore-globe-remove-portrait
          fetch-depth: 0

      - name: Update release and remove portrait markup
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path("index.html")
          css_path = Path("hero-portrait-v64.css")
          text = index_path.read_text(encoding="utf-8")

          old_release = 'data-release="2026.07.18.63"'
          new_release = 'data-release="2026.07.18.64"'
          assert text.count(old_release) == 1, "Expected one V63 release marker"
          text = text.replace(old_release, new_release, 1)

          v63_link = '  <link rel="stylesheet" href="core-contact-v63.css?v=20260718.63" data-core-contact-v63 />'
          v64_link = '  <link rel="stylesheet" href="hero-portrait-v64.css?v=20260718.64" data-hero-portrait-v64 />'
          assert text.count(v63_link) == 1, "Expected one V63 stylesheet link"
          assert v64_link not in text, "V64 stylesheet is already wired"
          text = text.replace(v63_link, f"{v63_link}\n{v64_link}", 1)

          desktop_pattern = re.compile(
              r'\n\s*<figure class="hero-v33-portrait"\b.*?</figure>\n',
              re.DOTALL,
          )
          text, desktop_count = desktop_pattern.subn("\n", text, count=1)
          assert desktop_count == 1, "Expected one desktop hero portrait"

          mobile_pattern = re.compile(
              r'\n\s*<button class="hero-portrait"\b.*?</button>\n',
              re.DOTALL,
          )
          text, mobile_count = mobile_pattern.subn("\n", text, count=1)
          assert mobile_count == 1, "Expected one mobile hero portrait"

          modal_start = text.find('  <div class="portrait-modal portrait-modal-v6" id="portrait-modal"')
          assert modal_start != -1, "Portrait modal start not found"
          modal_end_marker = '\n  </div>\n</body>'
          modal_end = text.find(modal_end_marker, modal_start)
          assert modal_end != -1, "Portrait modal end not found"
          text = text[:modal_start] + '</body>' + text[modal_end + len(modal_end_marker):]

          assert 'avatars.githubusercontent.com/u/302812532' not in text, "Portrait image reference remains"
          assert 'hero-v33-portrait' not in text, "Desktop portrait markup remains"
          assert 'id="portrait-trigger"' not in text, "Mobile portrait trigger remains"
          assert 'id="portrait-modal"' not in text, "Portrait modal remains"
          assert text.count(v64_link) == 1, "V64 stylesheet must be wired once"
          assert 'planet-v33-shell' in text and 'planet-v33-grid' in text and 'planet-v33-land' in text, "Globe artwork is missing"
          assert text.count('data-platform="x"') == 0, "Static X platform unexpectedly present"

          css = css_path.read_text(encoding="utf-8")
          assert css.count("{") == css.count("}"), "V64 CSS braces are unbalanced"
          assert '#home .hero-v33-planet > svg' in css, "Globe restoration rule missing"
          assert 'grid-template-areas' in css, "Portraitless layout rule missing"

          index_path.write_text(text, encoding="utf-8")
          PY

      - name: Remove one-time workflow and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/v64-wire.yml
          git add index.html hero-portrait-v64.css
          git commit -m "Apply V64 portraitless hero and restore globe"
          git push origin HEAD:feat/v64-restore-globe-remove-portrait
