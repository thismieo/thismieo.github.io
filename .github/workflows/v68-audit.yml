name: V68 repository audit and cleanup

on:
  push:
    branches:
      - feat/v68-hero-audit-cleanup

permissions:
  contents: write

jobs:
  audit-and-clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v68-hero-audit-cleanup
          fetch-depth: 0

      - name: Apply V68 source cleanup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")

          index = replace_once(index, 'data-release="2026.07.18.67"', 'data-release="2026.07.18.68"', "release marker")
          index = replace_once(index, 'cyber-header.css?v=20260718.44', 'cyber-header.css?v=20260718.68', "cyber header cache")
          index = replace_once(index, 'hero-v44.css?v=20260718.44', 'hero-v44.css?v=20260718.68', "hero V44 cache")
          index = replace_once(index, 'portrait.js?v=20260718.50', 'portrait.js?v=20260718.68', "portrait runtime cache")
          index = replace_once(index, 'core-contact-v63.css?v=20260718.63', 'core-contact-v63.css?v=20260718.68', "core CSS cache")
          index = replace_once(index, 'project-readouts-v66.css?v=20260718.67', 'project-readouts-v66.css?v=20260718.68', "readout cache")
          index = replace_once(index, 'core-contact-v63.js?v=20260718.67', 'core-contact-v63.js?v=20260718.68', "core runtime cache")

          obsolete_lines = [
              '  <link rel="stylesheet" href="project-mobile-v60.css?v=20260718.60" data-project-mobile-v60 />\n',
              '  <link rel="stylesheet" href="project-tabs-v61.css?v=20260718.61" data-project-tabs-v61 />\n',
              '  <script src="project-mobile-v60.js?v=20260718.60" defer></script>\n',
              '  <script src="project-tabs-v61.js?v=20260718.61" defer></script>\n',
          ]
          for line in obsolete_lines:
              index = replace_once(index, line, "", f"remove {line.strip()}")

          index = replace_once(
              index,
              '  <script src="projects-grid-v62.js?v=20260718.62" defer></script>\n',
              '  <script src="projects-runtime-v68.js?v=20260718.68" defer></script>\n',
              "replace legacy project runtime",
          )

          readout_link = '  <link rel="stylesheet" href="project-readouts-v66.css?v=20260718.68" data-project-readouts-v66 />\n'
          index = replace_once(
              index,
              readout_link,
              readout_link + '  <link rel="stylesheet" href="hero-interface-v68.css?v=20260718.68" data-hero-interface-v68 />\n',
              "wire V68 hero stylesheet",
          )

          core_script = '  <script src="core-contact-v63.js?v=20260718.68" defer></script>\n'
          index = replace_once(
              index,
              core_script,
              core_script + '  <script src="hero-interface-v68.js?v=20260718.68" defer></script>\n',
              "wire V68 hero runtime",
          )

          portrait_figure = re.compile(
              r'\n\s*<figure class="hero-v33-portrait".*?</figure>\n',
              re.DOTALL,
          )
          index, removed_figures = portrait_figure.subn("\n", index, count=1)
          if removed_figures != 1:
              raise SystemExit(f"portrait figure: expected one block, removed {removed_figures}")

          portrait_modal = re.compile(
              r'\n\s*<div class="portrait-modal portrait-modal-v6" id="portrait-modal".*?</div>\n\s*</body>',
              re.DOTALL,
          )
          index, removed_modals = portrait_modal.subn("\n</body>", index, count=1)
          if removed_modals != 1:
              raise SystemExit(f"portrait modal: expected one block, removed {removed_modals}")

          index_path.write_text(index, encoding="utf-8")

          cyber_path = Path("cyber-header.css")
          cyber = cyber_path.read_text(encoding="utf-8")
          cyber = replace_once(
              cyber,
              '.cyber-stream:hover .cyber-track-v46,\n.cyber-stream:focus-within .cyber-track-v46 {\n  animation-play-state: paused;\n}\n\n',
              '',
              "remove upper ribbon pause",
          )
          cyber_path.write_text(cyber, encoding="utf-8")

          hero_path = Path("hero-v44.css")
          hero = hero_path.read_text(encoding="utf-8")
          hero = replace_once(
              hero,
              '.system-ticker:hover .ticker-v44-track,\n.system-ticker:focus-within .ticker-v44-track {\n  animation-play-state: paused;\n}\n\n',
              '',
              "remove lower ribbon pause",
          )
          hero_path.write_text(hero, encoding="utf-8")

          portrait_path = Path("portrait.js")
          portrait = portrait_path.read_text(encoding="utf-8")
          portrait = replace_once(portrait, '2026.07.18.50', '2026.07.18.68', "portrait release")
          portrait = replace_once(portrait, 'mobile-v47.css?v=20260718.50', 'mobile-v47.css?v=20260718.68', "mobile layer cache")

          old_portrait_probe = '''  const portraitImage = document.querySelector("#home .hero-v33-portrait img");
          if (portraitImage) {
            portraitImage.sizes = "(max-width: 350px) 176px, (max-width: 620px) 190px, (max-width: 860px) 210px, (min-width: 1181px) 204px, 148px";
            portraitImage.decoding = "async";
            portraitImage.fetchPriority = "high";
          }

          '''
          portrait = replace_once(portrait, old_portrait_probe, "", "remove obsolete portrait probe")

          old_entries = '''  const entries = [
            "Logic Before Complexity",
            "Every Bug Reveals a Lesson",
            "Data Becomes Intelligence",
            "Build Systems · Not Shortcuts",
            "Patterns Become Predictions",
            "Think · Test · Refine",
            "Progress Compounds Quietly",
            "Code With Purpose"
          ];'''
          new_entries = '''  const entries = [
            "Build Systems · Not Shortcuts",
            "Data Becomes Intelligence",
            "Think · Test · Refine",
            "Patterns Become Predictions",
            "Progress Compounds Quietly",
            "Code With Purpose"
          ];'''
          portrait = replace_once(portrait, old_entries, new_entries, "simplify upper ribbon statements")
          portrait_path.write_text(portrait, encoding="utf-8")

          core_path = Path("core-contact-v63.js")
          core = core_path.read_text(encoding="utf-8")
          core = replace_once(core, '2026.07.18.67', '2026.07.18.68', "core release")
          core = replace_once(core, 'core-contact-v63.css?v=20260718.67', 'core-contact-v63.css?v=20260718.68', "core CSS runtime cache")
          core = replace_once(core, 'project-readouts-v66.css?v=20260718.67', 'project-readouts-v66.css?v=20260718.68', "readout runtime cache")

          portrait_cleanup = '''  /* Remove the personal portrait and its now-unused viewer. The globe, copy,
             terminal, buttons and planetary motion remain untouched. */
            document.querySelectorAll(
              "#home .hero-v33-portrait, #home .hero-mobile-legacy .hero-portrait"
            ).forEach((portrait) => portrait.remove());
            document.querySelector("#portrait-modal")?.remove();

          '''
          core = replace_once(core, portrait_cleanup, "", "remove obsolete runtime portrait cleanup")
          core_path.write_text(core, encoding="utf-8")

          for obsolete in [
              "project-mobile-v60.css",
              "project-mobile-v60.js",
              "project-tabs-v61.css",
              "project-tabs-v61.js",
              "projects-grid-v62.js",
          ]:
              path = Path(obsolete)
              if not path.exists():
                  raise SystemExit(f"obsolete file missing before cleanup: {obsolete}")
              path.unlink()
          PY

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Audit HTML CSS assets and repository hygiene
        shell: bash
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlsplit
          import re

          root = Path('.')
          errors = []

          class IndexParser(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
                  self.local_assets = []
                  self.anchor_targets = []
                  self.script_and_style_refs = []

              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if values.get('id'):
                      self.ids.append(values['id'])
                  href = values.get('href')
                  src = values.get('src')
                  if tag == 'a' and href and href.startswith('#') and len(href) > 1:
                      self.anchor_targets.append(href[1:])
                  value = src if tag in {'script', 'img', 'source'} else href if tag == 'link' else None
                  if not value:
                      return
                  parsed = urlsplit(value)
                  if parsed.scheme or parsed.netloc or value.startswith(('data:', 'mailto:', 'tel:', '//')):
                      return
                  path = parsed.path.lstrip('/')
                  if path:
                      self.local_assets.append((tag, value, path))
                      if tag in {'script', 'link'}:
                          self.script_and_style_refs.append(path)

          parser = IndexParser()
          index_text = Path('index.html').read_text(encoding='utf-8')
          parser.feed(index_text)

          seen = set()
          duplicate_ids = sorted({item for item in parser.ids if item in seen or seen.add(item)})
          if duplicate_ids:
              errors.append(f"duplicate HTML ids: {duplicate_ids}")

          ids = set(parser.ids)
          missing_anchors = sorted(set(parser.anchor_targets) - ids)
          if missing_anchors:
              errors.append(f"missing anchor targets: {missing_anchors}")

          for tag, original, local_path in parser.local_assets:
              if not (root / local_path).is_file():
                  errors.append(f"missing local {tag} asset: {original}")

          duplicate_refs = sorted({ref for ref in parser.script_and_style_refs if parser.script_and_style_refs.count(ref) > 1})
          if duplicate_refs:
              errors.append(f"duplicate script/style references: {duplicate_refs}")

          def css_balance(path):
              text = path.read_text(encoding='utf-8')
              depth = 0
              quote = None
              escaped = False
              in_comment = False
              i = 0
              while i < len(text):
                  char = text[i]
                  nxt = text[i + 1] if i + 1 < len(text) else ''
                  if in_comment:
                      if char == '*' and nxt == '/':
                          in_comment = False
                          i += 2
                          continue
                      i += 1
                      continue
                  if quote:
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == quote:
                          quote = None
                      i += 1
                      continue
                  if char == '/' and nxt == '*':
                      in_comment = True
                      i += 2
                      continue
                  if char in {'"', "'"}:
                      quote = char
                  elif char == '{':
                      depth += 1
                  elif char == '}':
                      depth -= 1
                      if depth < 0:
                          errors.append(f"CSS closes before opening: {path}")
                          return
                  i += 1
              if in_comment:
                  errors.append(f"unclosed CSS comment: {path}")
              if quote:
                  errors.append(f"unclosed CSS string: {path}")
              if depth != 0:
                  errors.append(f"unbalanced CSS braces ({depth}): {path}")

          css_files = sorted(root.glob('*.css'))
          js_files = sorted(root.glob('*.js'))
          for css in css_files:
              css_balance(css)

          text_files = [Path('index.html'), *css_files, *js_files]
          combined = '\n'.join(path.read_text(encoding='utf-8', errors='replace') for path in text_files)

          if re.search(r'animation-play-state\s*:\s*paused', combined, re.I):
              errors.append('a paused animation-play-state rule still exists')

          conflict_pattern = re.compile(r'^(<<<<<<<|=======|>>>>>>>)', re.M)
          for path in text_files:
              if conflict_pattern.search(path.read_text(encoding='utf-8', errors='replace')):
                  errors.append(f"merge conflict marker in {path}")

          obsolete_names = [
              'project-mobile-v60.css', 'project-mobile-v60.js',
              'project-tabs-v61.css', 'project-tabs-v61.js',
              'projects-grid-v62.js',
          ]
          for name in obsolete_names:
              if (root / name).exists():
                  errors.append(f"obsolete file still exists: {name}")
              if name in combined:
                  errors.append(f"obsolete file still referenced: {name}")

          required = [
              'hero-interface-v68.css', 'hero-interface-v68.js',
              'projects-runtime-v68.js', 'project-readouts-v66.css',
              'core-contact-v63.css', 'core-contact-v63.js',
          ]
          for name in required:
              if not (root / name).is_file():
                  errors.append(f"required V68 asset missing: {name}")

          if 'hero-v33-portrait' in index_text or 'portrait-modal-v6' in index_text:
              errors.append('portrait markup remains in index.html')

          empty_files = [str(path) for path in text_files if path.stat().st_size == 0]
          if empty_files:
              errors.append(f"empty source files: {empty_files}")

          referenced_names = set(parser.script_and_style_refs)
          dynamic_source = '\n'.join(path.read_text(encoding='utf-8', errors='replace') for path in js_files)
          potential_orphans = []
          for path in [*css_files, *js_files]:
              if path.name in referenced_names or path.name in dynamic_source:
                  continue
              potential_orphans.append(path.name)

          print(f"HTML ids: {len(parser.ids)}")
          print(f"Local assets checked: {len(parser.local_assets)}")
          print(f"CSS files checked: {len(css_files)}")
          print(f"JavaScript files checked: {len(js_files)}")
          print("Potential unreferenced top-level CSS/JS (manual review only):")
          for name in potential_orphans:
              print(f"  - {name}")

          if errors:
              print("AUDIT FAILED")
              for error in errors:
                  print(f"  ERROR: {error}")
              raise SystemExit(1)

          print("AUDIT PASSED")
          PY

      - name: Check whitespace and final diff
        shell: bash
        run: |
          git diff --check
          git status --short

      - name: Commit audited V68 changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Polish the hero and remove obsolete project layers"
          git push origin HEAD:feat/v68-hero-audit-cleanup
