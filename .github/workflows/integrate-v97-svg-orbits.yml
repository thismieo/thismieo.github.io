name: Integrate V97 SVG orbit engine

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate-v97:
    if: github.event.pull_request.head.ref == 'fix/v97-native-svg-orbits'
    runs-on: ubuntu-latest
    steps:
      - name: Check out V97 branch
        uses: actions/checkout@v4
        with:
          ref: fix/v97-native-svg-orbits
          fetch-depth: 0

      - name: Apply and validate V97
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/apply_v97_svg_orbits.py ]; then
            echo "V97 integration already applied."
            exit 0
          fi

          set +e
          {
            python3 scripts/apply_v97_svg_orbits.py
            apply_status=$?
            echo "APPLY_STATUS=$apply_status"
            if [ "$apply_status" -eq 0 ]; then
              python3 scripts/validate_site.py
              validate_status=$?
              echo "VALIDATE_STATUS=$validate_status"
              if [ "$validate_status" -eq 0 ]; then
                while IFS= read -r -d '' file; do
                  node --check "$file"
                done < <(find . -maxdepth 1 -type f -name '*.js' -print0)
                echo "NODE_STATUS=$?"
                git diff --check
                echo "DIFF_STATUS=$?"
              fi
            fi
          } > v97-diagnostic.txt 2>&1
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "4189828+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply V97 and capture validation result"
          git push origin HEAD:fix/v97-native-svg-orbits
