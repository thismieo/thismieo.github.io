name: Integrate V97 SVG orbit engine

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate-v97:
    if: github.event.pull_request.head.ref == 'fix/v97-native-svg-orbits'
    runs-on: ubuntu-latest
    steps:
      - name: Check out V97 branch
        uses: actions/checkout@v4
        with:
          ref: fix/v97-native-svg-orbits
          fetch-depth: 0

      - name: Apply and validate V97
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/apply_v97_svg_orbits.py ]; then
            echo "V97 integration already applied."
            exit 0
          fi

          python3 scripts/apply_v97_svg_orbits.py
          python3 scripts/validate_site.py

          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -maxdepth 1 -type f -name '*.js' -print0)

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace orbit runtime with native SVG motion"
          git push origin HEAD:fix/v97-native-svg-orbits
