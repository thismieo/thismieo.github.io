name: Apply V27 mobile audit

on:
  push:
    branches:
      - dev-portfolio-v27-mobile-technical-audit
    paths:
      - .v27-mobile-trigger

permissions:
  contents: write

jobs:
  apply-mobile-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev-portfolio-v27-mobile-technical-audit

      - name: Link V27 assets and enable safe-area viewport
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '<meta name="viewport" content="width=device-width, initial-scale=1.0" />',
                  '<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />',
              ),
              (
                  '<link rel="stylesheet" href="v23.css?v=3" />',
                  '<link rel="stylesheet" href="v23.css?v=3" />\n  <link rel="stylesheet" href="v27.css?v=1" />',
              ),
              (
                  '<script src="v16.js?v=2" defer></script>',
                  '<script src="v16.js?v=2" defer></script>\n  <script src="v27.js?v=1" defer></script>',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one occurrence of {old!r}, found {count}")
              text = text.replace(old, new)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove duplicate Google Fonts import
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("styles.css")
          text = path.read_text(encoding="utf-8")
          duplicate = "@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');\n\n"
          count = text.count(duplicate)
          if count != 1:
              raise SystemExit(f"Expected exactly one duplicate font import, found {count}")
          path.write_text(text.replace(duplicate, "", 1), encoding="utf-8")
          PY

      - name: Commit mobile audit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css
          git diff --cached --quiet || git commit -m "fix: integrate V27 mobile audit"
          git push
