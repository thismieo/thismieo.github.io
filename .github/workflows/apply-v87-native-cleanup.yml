name: Apply V87 native cleanup

on:
  push:
    branches:
      - feat/v87-native-cleanup

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V87 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v87-native-cleanup
          fetch-depth: 0

      - name: Update V87 cache keys
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          replacements = (
              ('data-release="2026.07.19.86"', 'data-release="2026.07.19.87"'),
              ('tech-icons-v69.css?v=20260719.83', 'tech-icons-v69.css?v=20260719.87'),
              ('hero-interface-v68.js?v=20260719.86', 'hero-interface-v68.js?v=20260719.87'),
          )
          for old, new in replacements:
              if old in text:
                  text = text.replace(old, new, 1)
              elif new not in text:
                  raise SystemExit(f"Missing cache token: {old}")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-v87-native-cleanup.yml

      - name: Validate repository
        run: |
          find . -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py
          git diff --check

      - name: Commit V87 integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/apply-v87-native-cleanup.yml
          git commit -m "Finalize V87 cache keys"
          git push origin HEAD:feat/v87-native-cleanup
