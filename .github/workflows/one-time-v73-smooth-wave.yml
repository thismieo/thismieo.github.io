name: One-time V73 smooth technical wave

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  wire-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out V73 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v73-smooth-tech-wave

      - name: Wire V73 cache keys and validator
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          replacements = {
              'data-release="2026.07.19.72"': 'data-release="2026.07.19.73"',
              'tech-icons-v69.css?v=20260719.72': 'tech-icons-v69.css?v=20260719.73',
              'hero-interface-v68.js?v=20260719.72': 'hero-interface-v68.js?v=20260719.73',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected one index match for {old!r}, found {text.count(old)}')
              text = text.replace(old, new, 1)
          index.write_text(text, encoding='utf-8')

          validator = Path('scripts/validate_site.py')
          validation_text = validator.read_text(encoding='utf-8')
          validator_replacements = {
              'data-release="2026.07.19.72"': 'data-release="2026.07.19.73"',
              'V72 release marker is missing': 'V73 release marker is missing',
          }
          for old, new in validator_replacements.items():
              if validation_text.count(old) != 1:
                  raise SystemExit(f'Expected one validator match for {old!r}, found {validation_text.count(old)}')
              validation_text = validation_text.replace(old, new, 1)
          validator.write_text(validation_text, encoding='utf-8')
          PY

      - name: Validate V73 implementation
        shell: bash
        run: |
          set -euo pipefail
          node --check hero-interface-v68.js
          python3 scripts/validate_site.py
          git diff --check
          python3 - <<'PY'
          from pathlib import Path

          css = Path('tech-icons-v69.css').read_text(encoding='utf-8')
          js = Path('hero-interface-v68.js').read_text(encoding='utf-8')
          index = Path('index.html').read_text(encoding='utf-8')

          checks = {
              'V73 release marker': 'data-release="2026.07.19.73"' in index,
              'one V73 stylesheet key': index.count('tech-icons-v69.css?v=20260719.73') == 1,
              'one V73 script key': index.count('hero-interface-v68.js?v=20260719.73') == 1,
              'V73 class in JS': 'is-tech-icons-v73' in js,
              'V73 item markup': 'hero-v73-tech-item' in js,
              'single strip wave': 'heroV73StripWave' in css,
              'no V72 runtime class': 'is-tech-icons-v72' not in js,
              'no V72 CSS animation': 'heroV72' not in css,
              'no glass blur': 'backdrop-filter' not in css,
              'no inner underline': '.hero-v73-tech-item::after' in css and 'content: none !important' in css,
              'no card animation': 'animation: heroV73Card' not in css,
              'no icon animation': 'animation: heroV73Icon' not in css,
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('V73 validation failed: ' + ', '.join(failed))
          PY

      - name: Commit V73 wiring and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/one-time-v73-smooth-wave.yml
          git add index.html scripts/validate_site.py .github/workflows/one-time-v73-smooth-wave.yml
          git commit -m 'Wire and validate V73 smooth technical wave'
          git push origin HEAD:feat/v73-smooth-tech-wave
