name: Apply V86 touch and terminal refinement

on:
  push:
    branches:
      - feat/v86-touch-terminal-smoothing

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V86 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v86-touch-terminal-smoothing
          fetch-depth: 0

      - name: Wire V86 cache keys and validation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_if_present(text: str, old: str, new: str) -> str:
              if old in text:
                  return text.replace(old, new, 1)
              if new not in text:
                  raise SystemExit(f"Neither old nor new token exists: {old}")
              return text

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          index = replace_if_present(
              index,
              '<html lang="en" data-release="2026.07.19.85">',
              '<html lang="en" data-release="2026.07.19.86">',
          )
          index = replace_if_present(
              index,
              '<script src="hero-interface-v68.js?v=20260719.85" defer></script>',
              '<script src="hero-interface-v68.js?v=20260719.86" defer></script>',
          )
          index_path.write_text(index, encoding="utf-8")

          validator_path = Path("scripts/validate_site.py")
          validator = validator_path.read_text(encoding="utf-8")
          validator = replace_if_present(
              validator,
              '    if \'data-release="2026.07.19.85"\' not in index_text:\n        errors.append("V85 release marker is missing")',
              '    if \'data-release="2026.07.19.86"\' not in index_text:\n        errors.append("V86 release marker is missing")',
          )
          validator = replace_if_present(
              validator,
              '    if \'hero-interface-v68.js?v=20260719.85\' not in index_text:\n        errors.append("V85 Hero refinement script cache key is missing")',
              '    if \'hero-interface-v68.js?v=20260719.86\' not in index_text:\n        errors.append("V86 Hero interaction script cache key is missing")',
          )
          validator = replace_if_present(
              validator,
              '        \'dataset.techIcons = "v83"\',',
              '        \'dataset.techIcons = "v86"\',',
          )
          required_anchor = "        'micro-polish.css?v=20260719.85',\n"
          additions = (
              "        'interaction-v86.css?v=20260719.86',\n"
              "        'requestAnimationFrame',\n"
              "        'is-releasing',\n"
              "        '--press-x',\n"
              "        '--terminal-visible-chars',\n"
          )
          if additions not in validator:
              validator = validator.replace(required_anchor, required_anchor + additions, 1)

          validator_path.write_text(validator, encoding="utf-8")
          PY

      - name: Remove one-time workflow from feature branch
        run: rm .github/workflows/apply-v86-touch-terminal.yml

      - name: Validate repository
        run: |
          find . -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py
          git diff --check

      - name: Commit V86 integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/validate_site.py .github/workflows/apply-v86-touch-terminal.yml
          git commit -m "Integrate V86 cache keys and validation"
          git push origin HEAD:feat/v86-touch-terminal-smoothing
