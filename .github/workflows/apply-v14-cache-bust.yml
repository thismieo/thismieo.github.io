name: Apply V14 cache bust

on:
  push:
    branches:
      - dev-portfolio-v14-mobile-menu-fix

permissions:
  contents: write

jobs:
  update-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev-portfolio-v14-mobile-menu-fix
      - name: Update V13 stylesheet version
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          updated = text.replace('v13.css?v=1', 'v13.css?v=2')
          if updated == text:
              print('Version already updated')
          else:
              path.write_text(updated, encoding='utf-8')
          PY
      - name: Commit cache bust
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix(site): refresh mobile navigation stylesheet"
          git push
