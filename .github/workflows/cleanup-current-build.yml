name: Finalize current website cleanup

on:
  push:
    branches:
      - dev-website-cleanup-current-build
    paths:
      - .cleanup-trigger

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: dev-website-cleanup-current-build
          fetch-depth: 0

      - name: Finalize files and branches
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          old = ' data-v18-cyber-rail'
          if html.count(old) != 1:
              raise SystemExit(f'Expected one legacy cyber-rail attribute, found {html.count(old)}')
          path.write_text(html.replace(old, ' data-cyber-rail'), encoding='utf-8')
          PY

          keep='^(main|backup-current-website-2026-07-17|dev-website-cleanup-current-build)$'
          mapfile -t branches < <(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}')
          for branch in "${branches[@]}"; do
            if [[ ! "$branch" =~ $keep ]]; then
              echo "Deleting stale branch: $branch"
              git push origin --delete "$branch"
            fi
          done

          rm -f .cleanup-trigger .finalize-cleanup-trigger

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Chore: finalize current website cleanup" || exit 0
          git push origin HEAD:dev-website-cleanup-current-build
