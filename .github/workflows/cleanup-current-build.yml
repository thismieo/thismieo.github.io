name: Consolidate current website build

on:
  push:
    branches:
      - dev-website-cleanup-current-build
    paths:
      - .cleanup-trigger

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: dev-website-cleanup-current-build
          fetch-depth: 0

      - name: Rename current layers and remove legacy files
        shell: bash
        run: |
          set -euo pipefail

          git mv enhancements.css effects.css
          git mv v5.css interface-polish.css
          git mv v8.css portrait-mobile.css
          git mv v11.css goals-mobile.css
          git mv v12.css stability.css
          git mv v16.css hero-portrait.css
          git mv v18.css cyber-header.css
          git mv v21.css goals-desktop.css
          git mv v22.css neural-layout.css
          git mv v23.css desktop-rhythm.css
          git mv v27.css mobile.css

          git mv v12.js interactions.js
          git mv v16.js portrait.js
          git mv v27.js mobile-nav.js

          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          html = index_path.read_text(encoding='utf-8')

          replacements = {
              'enhancements.css': 'effects.css?v=1',
              'v5.css': 'interface-polish.css?v=1',
              'v8.css?v=12': 'portrait-mobile.css?v=1',
              'v11.css?v=2': 'goals-mobile.css?v=1',
              'v12.css?v=1': 'stability.css?v=1',
              'v16.css?v=1': 'hero-portrait.css?v=1',
              'v18.css?v=2': 'cyber-header.css?v=1',
              'v21.css?v=1': 'goals-desktop.css?v=1',
              'v22.css?v=1': 'neural-layout.css?v=1',
              'v23.css?v=3': 'desktop-rhythm.css?v=1',
              'v27.css?v=1': 'mobile.css?v=1',
              'v12.js?v=1': 'interactions.js?v=1',
              'v16.js?v=2': 'portrait.js?v=1',
              'v27.js?v=1': 'mobile-nav.js?v=1',
          }

          for old, new in replacements.items():
              count = html.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one reference to {old}, found {count}')
              html = html.replace(old, new)

          index_path.write_text(html, encoding='utf-8')

          # Remove any remaining numbered release files after the active layers were renamed.
          for pattern in ('v*.css', 'v*.js'):
              for path in Path('.').glob(pattern):
                  if re.fullmatch(r'v\d+\.(?:css|js)', path.name):
                      path.unlink()

          # Remove unused root-level CSS and JS files. Only files referenced by index.html survive.
          local_refs = set()
          for match in re.findall(r'(?:href|src)="([^"?#]+\.(?:css|js))(?:\?[^"#]*)?"', html):
              if not match.startswith(('http://', 'https://', '//')) and '/' not in match:
                  local_refs.add(match)

          for pattern in ('*.css', '*.js'):
              for path in Path('.').glob(pattern):
                  if path.name not in local_refs:
                      path.unlink()

          missing = sorted(name for name in local_refs if not Path(name).is_file())
          if missing:
              raise SystemExit(f'Missing local assets after cleanup: {missing}')

          numbered = sorted(
              path.name for pattern in ('v*.css', 'v*.js')
              for path in Path('.').glob(pattern)
              if re.fullmatch(r'v\d+\.(?:css|js)', path.name)
          )
          if numbered:
              raise SystemExit(f'Numbered legacy files remain: {numbered}')

          if re.search(r'\bv\d+\.(?:css|js)\b', html):
              raise SystemExit('Numbered release references remain in index.html')

          print('Active local assets:')
          for name in sorted(local_refs):
              print(f' - {name}')
          PY

          for file in *.js; do
            node --check "$file"
          done

          rm -f .cleanup-trigger

      - name: Commit consolidated current build
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refactor: consolidate current website build" || exit 0
          git push origin HEAD:dev-website-cleanup-current-build
