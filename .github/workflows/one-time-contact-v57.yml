name: One-time V57 contact icon wiring

on:
  push:
    branches:
      - feat/v57-contact-icons-only

permissions:
  contents: write

jobs:
  wire-v57:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v57-contact-icons-only
          fetch-depth: 0

      - name: Add V57 asset and release marker
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          old_release = 'data-release="2026.07.18.56"'
          new_release = 'data-release="2026.07.18.57"'
          anchor = '  <link rel="stylesheet" href="contact-hub-v56.css?v=20260718.56" data-contact-hub-v56 />\n'
          addition = anchor + '  <link rel="stylesheet" href="contact-icons-v57.css?v=20260718.57" data-contact-icons-v57 />\n'

          if old_release not in text:
              raise SystemExit("Expected V56 release marker not found")
          if anchor not in text:
              raise SystemExit("Expected V56 contact stylesheet marker not found")
          if 'contact-icons-v57.css' in text:
              raise SystemExit("V57 contact stylesheet is already wired")

          text = text.replace(old_release, new_release, 1)
          text = text.replace(anchor, addition, 1)
          path.write_text(text, encoding="utf-8")

          css = Path("contact-icons-v57.css").read_text(encoding="utf-8")
          if css.count("{") != css.count("}"):
              raise SystemExit("V57 CSS braces are unbalanced")

          Path(".github/workflows/one-time-contact-v57.yml").unlink()
          PY

      - name: Commit V57 wiring and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/one-time-contact-v57.yml
          git commit -m "Activate V57 icon-only contact hub"
          git push origin HEAD:feat/v57-contact-icons-only
