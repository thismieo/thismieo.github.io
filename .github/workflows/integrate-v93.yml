name: Integrate V93 planetary motion

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate-v93:
    if: github.event.pull_request.head.ref == 'feat/v93-planetary-orbits'
    runs-on: ubuntu-latest
    steps:
      - name: Check out V93 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v93-planetary-orbits
          fetch-depth: 0

      - name: Apply and validate V93 once
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/apply_v93_planetary_motion.py ]; then
            echo "V93 integration already applied."
            exit 0
          fi

          python3 scripts/apply_v93_planetary_motion.py
          python3 scripts/validate_site.py

          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -maxdepth 1 -type f -name '*.js' -print0)

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore coordinated planetary motion on exact orbit paths"
          git push origin HEAD:feat/v93-planetary-orbits
