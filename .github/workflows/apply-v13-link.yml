name: Apply V13 stylesheet link

on:
  push:
    branches:
      - dev-portfolio-v13-fast-scroll-stability

permissions:
  contents: write

jobs:
  patch-index:
    if: ${{ !contains(github.event.head_commit.message, '[skip-v13-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: dev-portfolio-v13-fast-scroll-stability

      - name: Link V13 stylesheet
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '  <link rel="stylesheet" href="v12.css?v=1" />'
          addition = marker + '\n  <link rel="stylesheet" href="v13.css?v=1" />'
          if 'href="v13.css?v=1"' not in text:
              if marker not in text:
                  raise SystemExit('V12 stylesheet marker was not found')
              path.write_text(text.replace(marker, addition, 1), encoding='utf-8')
          PY

      - name: Commit generated link
        run: |
          if git diff --quiet; then
            echo "V13 stylesheet already linked."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "perf(site): load V13 scroll stability layer [skip-v13-patch]"
          git push
