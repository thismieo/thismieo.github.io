name: One-time V59 project carousel wiring

on:
  push:
    branches:
      - feat/v59-project-carousel-fix

permissions:
  contents: write

jobs:
  wire-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v59-project-carousel-fix
          fetch-depth: 0

      - name: Wire V59 and validate
        shell: python
        run: |
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')

          html = html.replace('data-release="2026.07.18.58"', 'data-release="2026.07.18.59"', 1)

          anchor = '  <link rel="stylesheet" href="contact-projects-v58.css?v=20260718.58" data-contact-projects-v58 />\n'
          addition = anchor + '  <link rel="stylesheet" href="project-carousel-v59.css?v=20260718.59" data-project-carousel-v59 />\n'
          if 'data-project-carousel-v59' not in html:
              if anchor not in html:
                  raise SystemExit('V58 stylesheet anchor not found')
              html = html.replace(anchor, addition, 1)

          index.write_text(html, encoding='utf-8')

          css = Path('project-carousel-v59.css').read_text(encoding='utf-8')
          if css.count('{') != css.count('}'):
              raise SystemExit('CSS brace mismatch')
          if html.count('data-project-carousel-v59') != 1:
              raise SystemExit('V59 stylesheet must be linked exactly once')
          if html.count('data-release="2026.07.18.59"') != 1:
              raise SystemExit('V59 release marker must appear exactly once')
          if 'grid-auto-flow: column' not in css or 'scroll-snap-type: x mandatory' not in css:
              raise SystemExit('Phone carousel rules missing')
          if 'data-current-section="projects"' not in css:
              raise SystemExit('Project navigator overlap guard missing')

      - name: Commit wiring and remove one-time workflow
        run: |
          rm .github/workflows/one-time-v59-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html project-carousel-v59.css .github/workflows/one-time-v59-validation.yml
          git commit -m "Wire and validate V59 project carousel"
          git push origin feat/v59-project-carousel-fix
