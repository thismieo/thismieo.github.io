name: One-time V50 cache bump

on:
  push:
    branches:
      - fix/cache-v50-asset-keys

permissions:
  contents: write

jobs:
  bump-cache-keys:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out cache-fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/cache-v50-asset-keys
          fetch-depth: 0

      - name: Update only the changed asset keys
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = {
              '<html lang="en" data-release="2026.07.18.44">': '<html lang="en" data-release="2026.07.18.50">',
              'ticker-v44.js?v=20260718.44': 'ticker-v44.js?v=20260718.50',
              'portrait.js?v=20260718.44': 'portrait.js?v=20260718.50',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected cache marker not found: {old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/one-time-cache-v50.yml").unlink()
          PY

      - name: Commit cache fix and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/one-time-cache-v50.yml
          git commit -m "Bump ribbon asset cache keys to V50"
          git push origin HEAD:fix/cache-v50-asset-keys
