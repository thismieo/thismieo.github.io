name: One-time V61 project tabs validation

on:
  push:
    branches:
      - feat/v61-mobile-project-tabs

permissions:
  contents: write

jobs:
  validate-and-wire:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v61-mobile-project-tabs
          fetch-depth: 0

      - name: Wire V61 assets
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_release = 'data-release="2026.07.18.60"'
          new_release = 'data-release="2026.07.18.61"'
          css_anchor = '  <link rel="stylesheet" href="project-mobile-v60.css?v=20260718.60" data-project-mobile-v60 />'
          css_line = '  <link rel="stylesheet" href="project-tabs-v61.css?v=20260718.61" data-project-tabs-v61 />'
          js_anchor = '  <script src="project-mobile-v60.js?v=20260718.60" defer></script>'
          js_line = '  <script src="project-tabs-v61.js?v=20260718.61" defer></script>'

          if old_release not in text:
              raise SystemExit('V60 release marker not found')
          if css_anchor not in text or js_anchor not in text:
              raise SystemExit('V60 asset anchors not found')
          if css_line in text or js_line in text:
              raise SystemExit('V61 assets already wired')

          text = text.replace(old_release, new_release, 1)
          text = text.replace(css_anchor, css_anchor + '\n' + css_line, 1)
          text = text.replace(js_anchor, js_anchor + '\n' + js_line, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate assets and wiring
        run: |
          node --check project-tabs-v61.js
          python - <<'PY'
          from pathlib import Path

          css = Path('project-tabs-v61.css').read_text(encoding='utf-8')
          html = Path('index.html').read_text(encoding='utf-8')
          js = Path('project-tabs-v61.js').read_text(encoding='utf-8')

          assert css.count('{') == css.count('}'), 'CSS braces are unbalanced'
          assert html.count('project-tabs-v61.css?v=20260718.61') == 1
          assert html.count('project-tabs-v61.js?v=20260718.61') == 1
          assert html.count('data-release="2026.07.18.61"') == 1
          assert 'grid-template-columns: repeat(3' in css
          assert 'scroll-snap-type: none' in css
          assert 'role", "tablist"' in js
          assert 'is-project-v61-active' in js
          PY

      - name: Commit wiring and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Wire V61 mobile project tabs"
          git rm .github/workflows/one-time-v61-validation.yml
          git commit -m "Remove one-time V61 validation workflow"
          git push origin feat/v61-mobile-project-tabs
