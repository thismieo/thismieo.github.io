name: Apply V89 learning console rebuild

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate:
    if: github.event.pull_request.head.ref == 'feat/v89-learning-console-rebuild-final'
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v89-learning-console-rebuild-final
          fetch-depth: 0
      - name: Apply V89 rebuild
        run: |
          if [ -f scripts/apply_v89_learning_console.py ]; then
            python scripts/apply_v89_learning_console.py
          else
            echo "V89 rebuild already applied."
          fi
      - name: Validate
        run: |
          find . -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py
          git diff --check
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No integration changes to commit."
          else
            git commit -m "Rebuild learning console as pure CSS component"
            git push origin HEAD:feat/v89-learning-console-rebuild-final
          fi
