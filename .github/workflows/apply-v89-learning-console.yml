name: Apply V89 learning console rebuild

on:
  push:
    branches:
      - feat/v89-learning-console-rebuild

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V89 branch
        uses: actions/checkout@v4
        with:
          ref: feat/v89-learning-console-rebuild
          fetch-depth: 0

      - name: Rebuild learning console
        run: |
          printf '%s' '[… trimmed by system for length …]LCBiYWNrZ3JvdW5kIDIyMG1zIGVhc2UsIGJveC1zaGFkb3cgMjIw ' | base64 --decode > /tmp/apply_v89.py
          python /tmp/apply_v89.py

      - name: Validate repository
        run: |
          find . -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py
          git diff --check

      - name: Commit V89 rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rebuild learning console as pure CSS component"
          git push origin HEAD:feat/v89-learning-console-rebuild
