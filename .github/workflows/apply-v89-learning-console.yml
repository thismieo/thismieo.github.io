name: Apply V89 learning console rebuild

on:
  push:
    branches:
      - feat/v89-learning-console-rebuild-final
    paths:
      - _v89_ready

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v89-learning-console-rebuild-final
          fetch-depth: 0
      - name: Apply V89 rebuild
        run: python scripts/apply_v89_learning_console.py
      - name: Validate
        run: |
          find . -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py
          git diff --check
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rebuild learning console as pure CSS component"
          git push origin HEAD:feat/v89-learning-console-rebuild-final
