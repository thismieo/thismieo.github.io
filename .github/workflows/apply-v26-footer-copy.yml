name: Apply V26 footer copy

on:
  push:
    branches:
      - dev-portfolio-v26-footer-copy-refresh
    paths:
      - .v26-footer-trigger

permissions:
  contents: write

jobs:
  update-footer-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev-portfolio-v26-footer-copy-refresh
      - name: Replace repeated footer sentence
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '<p>Learning Python · Building AI Skills · One commit at a time.</p>'
          new = '<p>A focused journey from programming foundations to intelligent systems.</p>'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one old footer sentence, found {count}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Commit footer copy update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "copy: refresh footer journey statement"
          git push
