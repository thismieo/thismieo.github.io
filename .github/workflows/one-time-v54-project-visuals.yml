name: One-time V54 project visuals wiring

on:
  push:
    branches:
      - feat/v54-project-visuals

permissions:
  contents: write

jobs:
  wire-v54-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v54-project-visuals
          fetch-depth: 0

      - name: Add cache-safe V54 assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = {
              '<html lang="en" data-release="2026.07.18.53">': '<html lang="en" data-release="2026.07.18.54">',
              '  <link rel="stylesheet" href="section-nav-v53.css?v=20260718.53" data-section-nav-v53 />': '  <link rel="stylesheet" href="section-nav-v53.css?v=20260718.53" data-section-nav-v53 />\n  <link rel="stylesheet" href="project-visuals-v54.css?v=20260718.54" data-project-visuals-v54 />',
              '  <script src="section-nav-v53.js?v=20260718.53" defer></script>': '  <script src="section-nav-v53.js?v=20260718.53" defer></script>\n  <script src="project-visuals-v54.js?v=20260718.54" defer></script>',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected V54 marker not found: {old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/one-time-v54-project-visuals.yml").unlink()
          PY

      - name: Commit V54 wiring and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/one-time-v54-project-visuals.yml
          git commit -m "Wire V54 animated project visuals"
          git push origin HEAD:feat/v54-project-visuals
