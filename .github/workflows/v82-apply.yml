name: Apply V82 compact rail finalization

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out V82 feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/v82-compact-terminal-rail
          fetch-depth: 0

      - name: Remove obsolete rail presentation and bump cache keys
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          interface_path = Path("hero-interface-v68.css")
          interface = interface_path.read_text(encoding="utf-8")

          start = interface.find("#home.is-hero-v68 .hero-v68-tech-strip {")
          end = interface.find("@media (min-width: 861px) {", start)
          if start >= 0 and end >= 0:
              interface = interface[:start] + interface[end:]

          interface = re.sub(
              r"\n\s*#home\.is-hero-v68 \.hero-v68-tech-strip(?: span)?(?: span::after)?\s*\{[^{}]*\}\n",
              "\n",
              interface,
          )
          interface = re.sub(
              r"\n@media \(prefers-reduced-motion: reduce\) \{\s*\}\s*\Z",
              "\n",
              interface,
          )

          if "hero-v68-tech-strip" in interface or "heroV68TechLine" in interface:
              raise SystemExit("Legacy V68 technical chip CSS remains after cleanup")
          interface_path.write_text(interface.rstrip() + "\n", encoding="utf-8")

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          replacements = (
              ('<html lang="en" data-release="2026.07.19.81">', '<html lang="en" data-release="2026.07.19.82">'),
              ('hero-interface-v68.css?v=20260718.69', 'hero-interface-v68.css?v=20260719.82'),
              ('tech-icons-v69.css?v=20260719.81', 'tech-icons-v69.css?v=20260719.82'),
              ('hero-interface-v68.js?v=20260719.81', 'hero-interface-v68.js?v=20260719.82'),
          )
          for old, new in replacements:
              if old in index:
                  index = index.replace(old, new, 1)
              elif new not in index:
                  raise SystemExit(f"Neither old nor new cache marker was found: {old}")
          index_path.write_text(index, encoding="utf-8")

          Path(".github/workflows/v82-finalize.yml").unlink(missing_ok=True)
          Path(".v82-trigger").unlink(missing_ok=True)
          PY

      - name: Update permanent site validation
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          path = Path("scripts/validate_site.py")
          text = path.read_text(encoding="utf-8")
          old_marker = '    if \'data-release="2026.07.19.81"\' not in index_text:'
          new_marker = '    if \'data-release="2026.07.19.82"\' not in index_text:'
          end_marker = '    exact_once_assets = ('

          if old_marker in text:
              start = text.index(old_marker)
              end = text.index(end_marker, start)
              source = """
          if 'data-release="2026.07.19.82"' not in index_text:
              errors.append("V82 release marker is missing")

          required_cache_markers = (
              'hero-interface-v68.css?v=20260719.82',
              'tech-icons-v69.css?v=20260719.82',
              'hero-interface-v68.js?v=20260719.82',
          )
          for marker in required_cache_markers:
              if marker not in index_text:
                  errors.append(f"V82 cache marker is missing: {marker}")

          tech_js_text = (ROOT / "hero-interface-v68.js").read_text(encoding="utf-8", errors="replace")
          tech_css_text = (ROOT / "tech-icons-v69.css").read_text(encoding="utf-8", errors="replace")
          hero_interface_text = (ROOT / "hero-interface-v68.css").read_text(encoding="utf-8", errors="replace")

          required_js_tokens = (
              'has-tech-rail',
              'hero-tech-rail',
              'hero-tech-item',
              'hero-tech-icon-shell',
              'hero-tech-icon',
              'hero-tech-copy',
              'document.createElement("a")',
              'dataset.techIcons = "v82"',
          )
          for token in required_js_tokens:
              if token not in tech_js_text:
                  errors.append(f"V82 technical rail JavaScript token is missing: {token}")

          required_css_tokens = (
              '#home.has-tech-rail .hero-tech-rail',
              '#home.has-tech-rail .hero-tech-item',
              '@keyframes heroTechRailWave',
              '@media (prefers-reduced-motion: reduce)',
          )
          for token in required_css_tokens:
              if token not in tech_css_text:
                  errors.append(f"V82 technical rail CSS token is missing: {token}")

          legacy_tokens = (
              'window.open(',
              'item.addEventListener("click"',
              'is-tech-icons-v73',
              'is-tech-icons-v81',
              'hero-v68-tech-strip',
              'hero-v81-tech-rail',
              '.hero-v73-tech-item',
              '.hero-v73-tech-strip',
              '.hero-v81-tech-item',
              '.hero-v81-tech-rail',
              'heroV68TechLine',
              'heroV73StripWave',
              'heroV81RailWave',
              '.hero-tech-item + .hero-tech-item::before',
              '.hero-tech-rail::after',
          )
          combined_rail_source = tech_js_text + tech_css_text + hero_interface_text
          for token in legacy_tokens:
              if token in combined_rail_source:
                  errors.append(f"Legacy or duplicate technical rail code remains: {token}")

          """
              block = textwrap.indent(textwrap.dedent(source).lstrip(), "    ")
              text = text[:start] + block + "\n" + text[end:]
          elif new_marker not in text:
              raise SystemExit("Could not locate either V81 or V82 validation block")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate final feature branch
        run: |
          node --check hero-interface-v68.js
          python scripts/validate_site.py
          python - <<'PY'
          from pathlib import Path

          css = Path("tech-icons-v69.css").read_text(encoding="utf-8")
          if css.count("{") != css.count("}"):
              raise SystemExit("Unbalanced technical rail CSS braces")
          if Path("scripts/__pycache__").exists():
              raise SystemExit("Python cache directory was generated")
          PY

      - name: Commit V82 feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize compact V82 technical rail"
          git push origin HEAD:feat/v82-compact-terminal-rail
