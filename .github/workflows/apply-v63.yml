name: Apply V63

on:
  push:
    branches:
      - feat/v63-clean-core-contact-five
    paths:
      - .github/workflows/apply-v63.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v63-clean-core-contact-five
          fetch-depth: 0

      - name: Wire V63 assets
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          text = text.replace('data-release="2026.07.18.62"', 'data-release="2026.07.18.63"', 1)

          css_anchor = '  <link rel="stylesheet" href="hero-project-grid-v62.css?v=20260718.62" data-hero-project-grid-v62 />'
          css_line = '  <link rel="stylesheet" href="core-contact-v63.css?v=20260718.63" data-core-contact-v63 />'
          if css_line not in text:
              if css_anchor not in text:
                  raise SystemExit('V62 CSS anchor not found')
              text = text.replace(css_anchor, css_anchor + '\n' + css_line, 1)

          js_anchor = '  <script src="contact-hub-v56.js?v=20260718.56" defer></script>'
          js_line = '  <script src="core-contact-v63.js?v=20260718.63" defer></script>'
          if js_line not in text:
              if js_anchor not in text:
                  raise SystemExit('Contact JS anchor not found')
              text = text.replace(js_anchor, js_anchor + '\n' + js_line, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate V63
        run: |
          node --check core-contact-v63.js
          python - <<'PY'
          from pathlib import Path

          css = Path('core-contact-v63.css').read_text(encoding='utf-8')
          js = Path('core-contact-v63.js').read_text(encoding='utf-8')
          html = Path('index.html').read_text(encoding='utf-8')

          if css.count('{') != css.count('}'):
              raise SystemExit('CSS brace imbalance')
          if html.count('core-contact-v63.css?v=20260718.63') != 1:
              raise SystemExit('V63 CSS wiring count is not one')
          if html.count('core-contact-v63.js?v=20260718.63') != 1:
              raise SystemExit('V63 JS wiring count is not one')
          if 'data-release="2026.07.18.63"' not in html:
              raise SystemExit('V63 release marker missing')
          if 'hero-v33-planet > svg' not in css:
              raise SystemExit('Globe artwork removal rule missing')
          if '[data-platform="x"]' not in js:
              raise SystemExit('X removal hook missing')
          if 'channels.length === 5' not in js:
              raise SystemExit('Five-channel validation missing')
          PY

      - name: Commit wiring and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-v63.yml
          git add index.html
          git commit -m "Wire V63 clean core and contact layout"
          git push origin HEAD:feat/v63-clean-core-contact-five
