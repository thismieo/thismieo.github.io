name: Wire Hero V40

on:
  push:
    branches:
      - polish/hero-v40-functional-closing-group

permissions:
  contents: write

jobs:
  wire-v40:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: polish/hero-v40-functional-closing-group
          fetch-depth: 0

      - name: Apply V40 wiring and functional capsule links
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          js_path = Path('hero-v33.js')
          css_path = Path('hero-spacing-v40.css')

          html = index_path.read_text(encoding='utf-8')
          js = js_path.read_text(encoding='utf-8')
          css = css_path.read_text(encoding='utf-8')

          html = html.replace('data-release="2026.07.17.39"', 'data-release="2026.07.18.40"', 1)
          html = html.replace('20260717.39', '20260718.40')
          js = js.replace('2026.07.17.39', '2026.07.18.40', 1)

          v39_link = '  <link id="hero-refine-v39-styles" rel="stylesheet" href="hero-refine-v39.css?v=20260718.40" data-hero-refine-v39 />\n'
          v40_link = '  <link id="hero-spacing-v40-styles" rel="stylesheet" href="hero-spacing-v40.css?v=20260718.40" data-hero-spacing-v40 />\n'
          if v40_link not in html:
              if v39_link not in html:
                  raise SystemExit('V39 stylesheet anchor not found')
              html = html.replace(v39_link, v39_link + v40_link, 1)

          old = '''      <div class="container hero-v33-capsules reveal" aria-label="Learning journey overview">
        <article>
          <span class="capsule-v33-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg></span>
          <div><span>Journey started</span><strong>04 Jun 2026</strong></div>
        </article>
        <article>
          <span class="capsule-v33-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 7-5 5 5 5M16 7l5 5-5 5M14 4l-4 16"/></svg></span>
          <div><span>Current study</span><strong>Python Foundations</strong></div>
        </article>
        <article>
          <span class="capsule-v33-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h6v5H4zM14 12h6v5h-6zM10 9.5h2a3 3 0 0 1 3 3"/></svg></span>
          <div><span>Working rhythm</span><strong>Learn → Practice → Build</strong></div>
        </article>
        <article>
          <span class="capsule-v33-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 1.6 5.4L19 10l-5.4 1.6L12 17l-1.6-5.4L5 10l5.4-1.6L12 3Z"/><path d="m19 15 .7 2.3L22 18l-2.3.7L19 21l-.7-2.3L16 18l2.3-.7L19 15Z"/></svg></span>
          <div><span>Long-term direction</span><strong>AI Engineering</strong></div>
        </article>
      </div>'''

          new = '''      <div class="container hero-v33-capsules reveal" aria-label="Learning journey overview">
        <a class="hero-v33-capsule-link" href="#journey" aria-label="Go to the Learning Journey section">
          <article>
            <span class="capsule-v33-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg></span>
            <div><span>Journey started</span><strong>04 Jun 2026</strong></div>
          </article>
        </a>
        <a class="hero-v33-capsule-link" href="#stack" aria-label="Go to the current Technology Ecosystem section">
          <article>
            <span class="capsule-v33-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 7-5 5 5 5M16 7l5 5-5 5M14 4l-4 16"/></svg></span>
            <div><span>Current study</span><strong>Python Foundations</strong></div>
          </article>
        </a>
        <a class="hero-v33-capsule-link" href="#about" aria-label="Go to the About section and learning rhythm">
          <article>
            <span class="capsule-v33-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h6v5H4zM14 12h6v5h-6zM10 9.5h2a3 3 0 0 1 3 3"/></svg></span>
            <div><span>Working rhythm</span><strong>Learn → Practice → Build</strong></div>
          </article>
        </a>
        <a class="hero-v33-capsule-link" href="#neural" aria-label="Go to the Neural Systems section">
          <article>
            <span class="capsule-v33-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 1.6 5.4L19 10l-5.4 1.6L12 17l-1.6-5.4L5 10l5.4-1.6L12 3Z"/><path d="m19 15 .7 2.3L22 18l-2.3.7L19 21l-.7-2.3L16 18l2.3-.7L19 15Z"/></svg></span>
            <div><span>Long-term direction</span><strong>AI Engineering</strong></div>
          </article>
        </a>
      </div>'''

          if old not in html:
              raise SystemExit('Original capsule block not found exactly')
          html = html.replace(old, new, 1)

          if html.count('hero-spacing-v40.css?v=20260718.40') != 1:
              raise SystemExit('V40 stylesheet link count is not exactly one')
          if html.count('class="hero-v33-capsule-link"') != 4:
              raise SystemExit('Expected exactly four functional capsule links')
          if '20260717.39' in html:
              raise SystemExit('Old cache key remains in index.html')
          if css.count('{') != css.count('}'):
              raise SystemExit('V40 CSS brace validation failed')

          index_path.write_text(html, encoding='utf-8')
          js_path.write_text(js, encoding='utf-8')
          PY

      - name: Validate JavaScript
        run: node --check hero-v33.js

      - name: Remove temporary workflow and commit final V40
        run: |
          rm .github/workflows/wire-hero-v40.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Wire V40 spacing and functional capsule navigation"
          git push origin polish/hero-v40-functional-closing-group
