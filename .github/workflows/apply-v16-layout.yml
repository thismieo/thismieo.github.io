name: Apply V16 layout

on:
  push:
    branches:
      - dev-portfolio-v16-hero-portrait-nav

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply layout migration
        run: python scripts/apply_v16_layout.py
      - name: Commit migrated layout
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "feat(site): move portrait into hero and simplify navigation"
          git push
