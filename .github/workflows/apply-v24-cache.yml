name: Apply V24 cache update

on:
  push:
    branches:
      - dev-portfolio-v24-stack-cursor-feedback
    paths:
      - .v24-cache-trigger

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev-portfolio-v24-stack-cursor-feedback
      - name: Bump V23 stylesheet cache key
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '<link rel="stylesheet" href="v23.css?v=1" />'
          new = '<link rel="stylesheet" href="v23.css?v=2" />'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one V23 stylesheet link, found {count}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Commit cache update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "fix: refresh Technology Ecosystem cursor styles"
          git push
